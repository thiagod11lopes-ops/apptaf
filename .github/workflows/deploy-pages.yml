# Publica a versão web do TAF no GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Build web
        env:
          EXPO_BASE_URL: /apptaf
        run: npm run build:web

      - name: Manifest e metadados web
        env:
          EXPO_BASE_URL: /apptaf
        run: node scripts/patch-web-dist.mjs

      - name: Copiar ícone PWA
        run: mkdir -p dist/assets && cp assets/icon.png dist/assets/icon.png

      - name: Enviar para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Publica a versão web do TAF na branch gh-pages (GitHub Pages)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Commit/branch do código a publicar (ex.: 659d8af ou main). Use para rollback.'
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Origem do deploy
        run: |
          echo "Publicando ref: ${{ github.event.inputs.ref || github.ref }}"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Build web
        env:
          EXPO_BASE_URL: /apptaf
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build:web

      - name: Manifest e metadados web
        env:
          EXPO_BASE_URL: /apptaf
        run: node scripts/patch-web-dist.mjs

      - name: Copiar ícone PWA
        run: mkdir -p dist/assets && cp assets/icon.png dist/assets/icon.png

      - name: Impedir deploy Vercel na branch gh-pages
        run: cp scripts/vercel-gh-pages.json dist/vercel.json

      - name: Publicar na branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: deploy:${{ github.event.inputs.ref || github.sha }}
